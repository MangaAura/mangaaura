<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#632496"/>
      <stop offset="50%" stop-color="#904dc2"/>
      <stop offset="100%" stop-color="#a968db"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dba5f9" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#fcfdfc" stop-opacity=".1"/>
    </linearGradient>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#glow)" stroke-width="4"/>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="230" fill="url(#bg)"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
  <!-- Stylized 'M' letterform -->
  <path d="M160 340V172l64 80 64-80v168" fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Accent sparkle dots -->
  <circle cx="192" cy="140" r="6" fill="#dba5f9" opacity=".8"/>
  <circle cx="340" cy="180" r="4" fill="#dba5f9" opacity=".6"/>
  <circle cx="160" cy="380" r="5" fill="#fcfdfc" opacity=".5"/>
  <!-- Small decorative arcs -->
  <path d="M340 200Q380 256 340 312" fill="none" stroke="#dba5f9" stroke-width="3" stroke-linecap="round" opacity=".5"/>
</svg>