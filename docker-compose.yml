version: '3.8'

services:
  # PostgreSQL - Database Core
  postgres:
    image: postgres:16-alpine
    container_name: mangaaura-postgres
    environment:
      POSTGRES_USER: ${DOCKER_POSTGRES_USER:-mangaaura}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:?Error: DOCKER_POSTGRES_PASSWORD no configurada en .env}
      POSTGRES_DB: mangaaura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangaaura"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mangaaura-network

  # MongoDB - Analytics & Big Data
  mongodb:
    image: mongo:7-jammy
    container_name: mangaaura-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DOCKER_MONGO_USER:-mangaaura}
      MONGO_INITDB_ROOT_PASSWORD: ${DOCKER_MONGO_PASSWORD:?Error: DOCKER_MONGO_PASSWORD no configurada en .env}
      MONGO_INITDB_DATABASE: mangaaura_analytics
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mangaaura-network

  # Redis - Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: mangaaura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mangaaura-network

  # pgAdmin - PostgreSQL Admin (opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mangaaura-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DOCKER_PGADMIN_EMAIL:-admin@mangaaura.es}
      PGADMIN_DEFAULT_PASSWORD: ${DOCKER_PGADMIN_PASSWORD:?Error: DOCKER_PGADMIN_PASSWORD no configurada en .env}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mangaaura-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  mangaaura-network:
    driver: bridge
